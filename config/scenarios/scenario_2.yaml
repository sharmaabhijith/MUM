# =============================================================================
# Scenario 2 — Exec + Team: Board Presentation Prep
# Relationship type: Hierarchical
# =============================================================================

scenario_id: "2"
name: "Exec + Team: Board Presentation Prep"
relationship_type: hierarchical
domain: "Business / Finance"
sessions_per_user: 7
turns_per_session: 16

