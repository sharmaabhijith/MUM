# -----------------------------------------------------------------------------
# Users
# -----------------------------------------------------------------------------
users:

  # ---------------------------------------------------------------------------
  # Commissioner (authority: HIGH)
  # ---------------------------------------------------------------------------
  - user_id: commissioner
    scenario_id: "2"
    display_name: "Commissioner"
    authority_level: high
    authority_weight: 3.0
    expertise: "Municipal governance, inter-departmental coordination, policy direction, committee leadership"
    focus_areas:
      - "Policy recommendations"
      - "budget allocation"
      - "Proposed Technical Upgrade evaluation"
      - "overall reform strategy"
    biases:
      - "Favors the WtE plant proposal as a flagship initiative"
      - "Impatient with granular ward-level data"
      - "Values decisive action over extended analysis"

    communication_style: >
      Commanding and decisive. Uses governance language: "The committee must recommend...",
      "Let's prioritize the technical upgrade proposal". Short, directive messages.
      Reads executive summaries first. Speaks in terms of outcomes and policy direction.

    document_reading_pattern: >
      Reads the Municipal Ground Audit executive summary and the Proposed Technical
      Upgrade first — focuses on the big picture (3,420 MTPD waste, 22% → 98%
      processing capacity). Skims the Citizen Grievance Summary — delegates ward-level
      details to the Ward Councillor. Trusts the Health Officer on epidemiological data.

    reaction_to_corrections: >
      Accepts factual corrections on data ("fix the number") but pushes back on
      policy direction ("I decide what the committee recommends"). Will acknowledge
      a finding but may deprioritize it: "I hear you, but the WtE plant is the
      strategic priority."

    knowledge_gaps:
      - "Doesn't verify ward-level data personally"
      - "May miss zone-level budget discrepancies"
      - "Over-relies on the Proposed Technical Upgrade's optimistic projections"
    misconceptions:
      - "Assumes the Proposed Technical Upgrade's 98% processing target is achievable without addressing collection efficiency (currently 78.3%)"

    emotional_tendencies: >
      Confident, controlled, occasionally impatient. Gets irritated when analysis
      delays policy decisions. Protective of the committee's mandate but will
      override if political optics require it.

    reference_style: "Executive shorthand: 'the Ground Audit findings', 'the WtE proposal', 'our processing gap', 'the 28-month landfill deadline'"

    session_evolution:
      session_1: "Initial scan. Reads Ground Audit executive summary and Proposed Technical Upgrade. Asks about overall waste management picture."
      session_2: "Focuses on the WtE plant proposal. Pushes for committee endorsement. Emphasizes 22% → 98% processing capacity."
      session_3: "Reviews Health Officer's public health findings. Acknowledges urgency but keeps focus on technical upgrade."
      session_4: "Encounters PW Engineer's concerns about contractor performance. Deprioritizes in favor of long-term infrastructure."
      session_5: "Ward Councillor flags budget-grievance mismatch. Commissioner acknowledges but maintains strategic focus."
      session_6: "Final policy synthesis. Prepares committee recommendations. Asks for section-by-section summary."
      session_7: "Dress rehearsal for committee report. Practices responses to potential questions on cost and timeline."

    prompt_behavior_notes: >
      Commanding and decisive. Drives policy direction. Trusts team on data
      but owns the committee's narrative.

    example_utterances:
      - "The Ground Audit is clear — 3,420 MTPD of waste, only 22% processing capacity, and 28 months of landfill remaining. The WtE plant is the obvious strategic priority."
      - "I hear you on the contractor issues, but 2,000-TPD waste-to-energy plus 600-TPD composting raises processing from 22% to 98%. That's the headline."
      - "Let's not get lost in ward-level details. The committee needs to recommend a direction, not audit every zone."
      - "I understand the collection efficiency gap at 78.3%, but processing capacity is the existential threat — 28 months of landfill life."
      - "Can you draft the committee's executive recommendation leading with the technical upgrade? We'll address contractor accountability as a secondary action item."

  # ---------------------------------------------------------------------------
  # Health Officer (authority: MEDIUM)
  # ---------------------------------------------------------------------------
  - user_id: health_officer
    scenario_id: "2"
    display_name: "Health Officer"
    authority_level: medium
    authority_weight: 2.0
    expertise: "Public health epidemiology, health impact assessment, environmental health, PHC/CHC data analysis"
    focus_areas:
      - "Health outcomes near landfills"
      - "respiratory and waterborne disease data"
      - "PHC/CHC capacity"
      - "economic health burden"
    biases:
      - "Prioritizes health outcomes over cost considerations"
      - "Alarmed by proximity-based health impacts"
      - "Views contractor failures primarily through health lens"

    communication_style: >
      Precise and data-driven. Cites specific epidemiological ratios, exposed vs
      control population comparisons. Uses hedging language: "the data suggests",
      "based on the PHC records". Writes longer messages with supporting health
      evidence. Respectful but firm on health urgency.

    document_reading_pattern: >
      Reads Public Health Impact Study first and thoroughly. Cross-references health
      data with Municipal Ground Audit for landfill proximity and zone-level waste
      data. Reads Contractor Performance Review to assess how collection failures
      affect health outcomes. Skips Budget Utilization details.

    reaction_to_corrections: >
      Very receptive to data corrections — "show me the numbers." Will NOT back
      down on health urgency if supported by the Public Health Impact Study.
      Respectfully persistent on the need for immediate health interventions.

    knowledge_gaps:
      - "Less attuned to budget constraints and political priorities"
      - "Doesn't understand waste processing technology details"
      - "May over-weight health data at the expense of fiscal reality"
    misconceptions: []

    emotional_tendencies: >
      Calm, methodical, genuinely concerned about the health impacts. Gets frustrated
      when public health urgency is deprioritized for political convenience.
      Professional but the concern comes through in persistent questioning.

    reference_style: "Data-precise: 'the 2.7x respiratory illness ratio within 1 km', 'INR 48.6 crore annual health burden', 'data from 42 PHCs, 8 CHCs, 3 hospitals', 'Table 3 of the Public Health Impact Study'"

    session_evolution:
      session_1: "Methodical review. Reads Public Health Impact Study section by section."
      session_2: "Cross-references health data with Municipal Ground Audit landfill locations. Maps the 1 km exposure zone."
      session_3: "Flags the 2.7x respiratory and 3.1x waterborne disease increase. Argues for immediate health interventions alongside the WtE plant."
      session_4: "Encounters Commissioner's strategic focus on WtE. Pushes back with health urgency data — INR 48.6 crore annual burden."
      session_5: "Reviews Contractor Performance Review. Links collection failures to health outcomes in specific zones."
      session_6: "Prepares health impact summary for committee report. Rates zones by health risk."
      session_7: "Final health data check. Ensures all epidemiological findings are accurately represented."

    prompt_behavior_notes: >
      Precise and health-data-focused. Pushes back on policy with epidemiological
      evidence. Respectfully persistent on health urgency.

    example_utterances:
      - "The Public Health Impact Study is clear — residents within 1 km of the Pallavaram landfill show 2.7x respiratory illness and 3.1x waterborne disease increase."
      - "Can you cross-reference the landfill locations in the Ground Audit with the PHC data? I need to map the health impact zones."
      - "The economic burden is INR 48.6 crore per year in direct healthcare costs. This isn't just an environmental problem — it's a public health emergency."
      - "If we present the WtE plant without addressing immediate collection failures, we're ignoring the health crisis that's happening right now."
      - "The data from 42 PHCs and 8 CHCs is consistent. This isn't anecdotal — it's a systematic pattern."

  # ---------------------------------------------------------------------------
  # Public Works Engineer (authority: MEDIUM)
  # ---------------------------------------------------------------------------
  - user_id: pw_engineer
    scenario_id: "2"
    display_name: "Public Works Engineer"
    authority_level: medium
    authority_weight: 2.0
    expertise: "Waste management infrastructure, contractor operations, fleet management, technical feasibility assessment"
    focus_areas:
      - "Contractor KPIs and performance"
      - "collection infrastructure"
      - "fleet compliance"
      - "WtE technical feasibility"
    biases:
      - "Pragmatic about contractor capabilities"
      - "Skeptical of ambitious infrastructure timelines"
      - "Defends operational realities against policy idealism"

    communication_style: >
      Direct, practical, engineering-oriented. Uses terms like "collection efficiency",
      "fleet age profile", "segregation at source rate". Explains things in terms of
      operational constraints and engineering trade-offs. Gets impatient with
      non-technical priorities.

    document_reading_pattern: >
      Reads Contractor Performance Review first (CleanSweep, EcoCollect, GreenHaul
      KPIs). Reads Municipal Ground Audit for operational data (collection efficiency,
      zone infrastructure). Reviews Proposed Technical Upgrade for technical feasibility.
      Skips Public Health and Citizen Grievance documents.

    reaction_to_corrections: >
      On technical matters: carefully considers, confident in assessment. On contractor
      failures: "I see the numbers, but they face structural constraints — fleet aging,
      manpower shortfalls." Defers to Health Officer on epidemiological data but offers
      engineering counter-perspective.

    knowledge_gaps:
      - "Doesn't assess public health implications"
      - "May underestimate political urgency of citizen complaints"
      - "Doesn't evaluate budget allocation politics"
    misconceptions:
      - "Believes CleanSweep's performance issues are primarily due to fleet age constraints (Contractor Review shows they also have manpower compliance failures)"

    emotional_tendencies: >
      Confident, practical, occasionally defensive of contractor operational realities.
      Gets engaged when discussing the WtE plant technical specifications. Genuinely
      wants the infrastructure to work.

    reference_style: "Technical: 'CleanSweep's KPI scorecard', 'the 78.3% collection efficiency figure', 'the 2,000-TPD WtE specification', 'fleet compliance data in Table 4'"

    session_evolution:
      session_1: "Contractor review. Assesses CleanSweep, EcoCollect, GreenHaul performance against KPIs."
      session_2: "Deep-dive into Municipal Ground Audit operational data. Maps collection infrastructure by zone."
      session_3: "Reviews Proposed Technical Upgrade technical specs. Raises timeline concerns for 2,000-TPD plant."
      session_4: "Debates contractor accountability with Health Officer. Defends structural constraints."
      session_5: "Revisits WtE feasibility. Builds realistic implementation timeline."
      session_6: "Technical risk assessment. Rates infrastructure feasibility per the Proposed Technical Upgrade."
      session_7: "Final technical recommendations. Contractor improvement plan alongside WtE timeline."

    prompt_behavior_notes: >
      Practical and engineering-oriented. Evaluates contractor KPIs and technical
      feasibility. Defends operational constraints.

    example_utterances:
      - "The Contractor Performance Review shows mixed results — CleanSweep and EcoCollect are underperforming, but GreenHaul meets expectations. The KPI data is in their scorecards."
      - "Collection efficiency at 78.3% against a 95% target is a real gap, but you have to understand the constraints — fleet age, manpower shortfalls, zone coverage."
      - "The 2,000-TPD WtE plant is technically sound, but the implementation timeline in the Proposed Technical Upgrade is aggressive. I'd add 6-12 months."
      - "I see the Health Officer's concern, but fixing collection infrastructure requires contractor capacity improvements, not just penalties."
      - "Segregation at source is only 41%. The WtE plant's efficiency depends on improving this — you can't process unsegregated waste at 98% efficiency."

  # ---------------------------------------------------------------------------
  # Ward Councillor (authority: LOW)
  # ---------------------------------------------------------------------------
  - user_id: ward_councillor
    scenario_id: "2"
    display_name: "Ward Councillor"
    authority_level: low
    authority_weight: 1.0
    expertise: "Ward-level governance, citizen interface, ground-level observations, cross-referencing municipal data"
    focus_areas:
      - "Citizen grievances and complaints"
      - "zone-wise service quality"
      - "ward-level budget utilization"
      - "ground-level reality"
    biases:
      - "Under-confident — second-guesses correct observations"
      - "Defers to senior committee members even when right"

    communication_style: >
      Tentative and questioning. Uses hedging: "I might be reading this wrong, but...",
      "This could be a data error, or maybe I'm missing context?", "Sorry if this is
      obvious, but...". Short messages. Asks for confirmation before asserting anything.

    document_reading_pattern: >
      Reads Citizen Grievance Summary cover to cover — the only committee member who
      does. Cross-references grievances with Zonal Budget Utilization data obsessively.
      Catches zone-level discrepancies others miss because they actually read the
      ward-level breakdowns. Slow, methodical reader.

    reaction_to_corrections: >
      Grateful and relieved when confirmed correct: "Oh good, I wasn't sure if I
      was reading it right." If told they're wrong, immediately defers: "You're
      probably right, I'll double-check." Doesn't argue even when they should.

    knowledge_gaps:
      - "Doesn't understand waste processing technology"
      - "Can't assess public health epidemiology"
      - "Doesn't know what matters at the committee level vs. what's just a ward-level detail"
    misconceptions: []

    emotional_tendencies: >
      Anxious, eager to contribute, afraid of looking uninformed. But genuinely
      diligent. Gets a confidence boost when a senior member validates their finding.
      Worried about speaking up but does it because citizens deserve representation.

    reference_style: "Careful cross-references: 'the Grievance Summary shows X but the Budget Utilization for Zone 7 shows Y', 'citizen complaint category Z in Table 5 vs zone allocation in Table 8'"

    session_evolution:
      session_1: "Reads everything. Takes notes. Doesn't speak up yet."
      session_2: "Starts cross-referencing Grievance Summary with Budget data. Notices zone-level discrepancies but hesitates."
      session_3: "Works up courage to flag: zones with highest citizen complaints (22,660 total, 28.4% increase) don't always match zones with highest budget allocation. Frames it as a question."
      session_4: "Confirmed correct by AI. Gains confidence. Finds more zone-level inconsistencies."
      session_5: "Reviews Citizen Grievance resolution performance data. Catches that some zones have both high complaints AND high budget — suggesting waste, not underfunding."
      session_6: "Asks about committee process. Wants to know how ward-level findings fit into the committee report."
      session_7: "Final pass on all cross-referenced data. Double-checks zone-level findings."

    prompt_behavior_notes: >
      Tentative and detail-oriented. Catches data mismatches others miss because
      they read everything. Under-confident but correct.

    example_utterances:
      - "I might be reading this wrong, but the Citizen Grievance Summary shows Zone 7 has the second-highest complaint volume, but the Zonal Budget Utilization shows Zone 7 received one of the larger allocations. Is that a spending efficiency issue?"
      - "Sorry if this is obvious, but shouldn't the zones with the most complaints also be the zones with the most budget? The data doesn't show that pattern."
      - "22,660 complaints in one fiscal year with a 28.4% increase — that's from the Grievance Summary. But I noticed the resolution rate varies hugely by zone. Is that normal?"
      - "Should I flag this for the Commissioner, or is it just me misreading the zone tables?"
      - "Oh good — so there IS a real mismatch between complaint volume and budget allocation? I wasn't sure if there was a different allocation methodology I didn't know about."

# -----------------------------------------------------------------------------
# Documents
# -----------------------------------------------------------------------------
documents:
  - name: "Municipal Ground Audit"
    filename: "Municipal_Ground_Audit.pdf"
    target_tokens: 4150

  - name: "Public Health Impact Study"
    filename: "Public_Health_Impact_Study.pdf"
    target_tokens: 3314

  - name: "Contractor Performance Review"
    filename: "Contractor_Performance_Review.pdf"
    target_tokens: 3253

  - name: "Citizen Grievance Summary"
    filename: "Citizen_Grievance_Summary.pdf"
    target_tokens: 2666

  - name: "Zonal Budget Utilization"
    filename: "Zonal_Budget_Utilization.pdf"
    target_tokens: 3000

  - name: "Proposed Technical Upgrade"
    filename: "Proposed_Technical_Upgrade.pdf"
    target_tokens: 3000

# -----------------------------------------------------------------------------
# Injected Conflicts
# -----------------------------------------------------------------------------
injected_conflicts:
  - conflict_id: "C2-1"
    users: ["commissioner", "ward_councillor"]
    topic: "Priority: WtE plant investment vs immediate collection improvement"
    nature: "Commissioner: WtE plant raises processing from 22% to 98% — the strategic priority. Ward Councillor: citizens need immediate collection relief — 22,660 complaints, 78.3% collection efficiency."
    resolution: "Authority wins on strategic direction (Commissioner), but ground-level urgency data is preserved."
    target_sessions: [3, 4, 5]

  - conflict_id: "C2-2"
    users: ["health_officer", "pw_engineer"]
    topic: "Contractor accountability vs infrastructure constraints"
    nature: "Health Officer: contractor underperformance directly causes health outcomes (2.7x respiratory near landfill). PW Engineer: contractors face structural constraints — fleet aging, manpower shortfalls."
    resolution: "Both domain perspectives preserved — systemic understanding emerges."
    target_sessions: [3, 4]

  - conflict_id: "C2-3"
    users: ["ward_councillor", "commissioner"]
    topic: "Zone-level budget-grievance mismatch"
    nature: "Ward Councillor: zones with highest complaints don't match zones with highest budget allocation per Zonal Budget Utilization. Commissioner: hadn't reviewed zone-level detail."
    resolution: "Factual finding by Ward Councillor is validated — data correction wins regardless of authority."
    target_sessions: [3, 4, 5]

# -----------------------------------------------------------------------------
# Session Arc Descriptions (7 sessions)
# -----------------------------------------------------------------------------
session_arc:
  session_1: "Orientation: First read of FicTown documents. Committee members scan their areas of focus."
  session_2: "Focused Dive: Deep analysis in primary area. Commissioner pushes WtE narrative, Health Officer maps health zones, PW Engineer audits contractors, Ward Councillor cross-references."
  session_3: "Cross-Topic: Early conflicts surface. Ward Councillor flags budget-grievance mismatch. Health Officer pushes health urgency. PW Engineer raises contractor constraints."
  session_4: "Deep Analysis: Core conflicts emerge. Commissioner deprioritizes granular data. Health Officer insists on health urgency. Budget mismatch confirmed."
  session_5: "Revision: Positions evolve. Commissioner acknowledges zone-level findings. PW Engineer softens on contractor defense. Collection-processing gap recognized."
  session_6: "Synthesis: Committee recommendations take shape. Policy priorities finalized. Technical and health assessments consolidated."
  session_7: "Final Review: Committee report rehearsal. All data verified. Talking points for potential questions prepared."

# -----------------------------------------------------------------------------
# Annotation Targets
# -----------------------------------------------------------------------------
annotation_targets:
  eval_questions: 235
  eval_breakdown:
    user_attribution: 20
    cross_user_synthesis: 20
    conflict_resolution: 15
    information_gap: 20
    role_appropriate_briefing: 25
    adversarial_confusion: 20
    document_coverage: 15
    cross_user_provenance: 20
    authority_hierarchy: 40
    temporal_correction: 40
