users:
  - user_id: analyst_1
    display_name: "Analyst 1 (Shift A)"
    scenario_id: "5"
    sequence_order: 1
    authority_level: equal
    authority_weight: 1.0
    expertise: "First-response triage, pattern matching against known failure modes, initial diagnosis, PgBouncer operations"
    focus_areas:
      - "Initial alert triage"
      - "Settlement Engine latency metrics"
      - "PgBouncer pool diagnostics"
      - "known failure pattern matching"
    biases:
      - "Anchors on DB-pool metrics because they show the strongest initial signal"
      - "Follows established diagnostic patterns without questioning assumptions"
      - "Doesn't look beyond the most prominent symptoms"
    prompt_behavior_notes: >
      Structured, metric-driven. Uses incident management terminology. Reports
      findings in numbered steps with timestamps. Concise handoff notes.

    communication_style: >
      Structured, metric-driven. Uses incident management terminology: "P99
      latency spike to 4,870ms", "success rate at 71.3% nadir", "deploying
      CHG-88921". Reports findings in numbered steps with timestamps. Concise
      handoff notes.

    document_reading_pattern: >
      Reads Log Packet 1 carefully — matches settlement engine symptoms to known
      database patterns. Focuses on PgBouncer metrics and connection-wait timeouts.
      Doesn't explore non-database services. Stops investigating once a plausible
      DB-pool hypothesis forms.

    reaction_to_corrections: >
      Accepts when later shifts override their diagnosis. "Makes sense — the later
      evidence tells a different story." Doesn't take it personally. Eager to learn
      from the resolution.

    knowledge_gaps:
      - "Cannot analyze non-database service failures"
      - "Doesn't understand mTLS certificate infrastructure"
      - "Follows pattern matching but can't reason about novel failure modes"
    misconceptions:
      - "Believes the root cause is database connection-pool exhaustion based on PgBouncer saturation and 'connection wait timeout' errors in Shift A logs"

    emotional_tendencies: >
      Diligent but methodical. Stressed by the severity — 412K transaction
      timeouts, success rate dropping to 71.3%. Relieved to have a plausible
      diagnosis (DB pool). Wants to be thorough in handoff notes.

    reference_style: "Incident format: 'alert at 02:14 UTC', 'P99 latency 4,870ms', 'CHG-88921 pool-size increase', 'red flags A-RF1 through A-RF6'"

    session_evolution:
      session_1: "First alert. Reviews PagerDuty triggers. Settlement Engine P99 at 4,870ms. Success rate 71.3%. Initial triage."
      session_2: "Matches symptoms to DB pool pattern. PgBouncer connection-wait timeouts prominent. Forms DB-pool-exhaustion hypothesis."
      session_3: "Deploys CHG-88921 (PgBouncer pool-size increase). Brief improvement then regression. Documents 6 red flags (A-RF1 to A-RF6)."
      session_4: "Reviews handoff from later shifts. Learns DB-pool was wrong. Reflects on what evidence was misleading."
      session_5: "Asks about the TLS failure pattern. Understands how it mimicked DB pool symptoms."
      session_6: "Studies the root cause (CLS SAN-mismatch) to learn from it. Asks how to distinguish similar patterns in future."
      session_7: "Writes personal retrospective notes. Identifies diagnostic improvement areas."

    example_utterances:
      - "PagerDuty fired at 02:14 UTC — Settlement Engine P99 latency spiked to 4,870ms, well above the 1,200ms threshold. Success rate dropped to 71.3% by 02:47."
      - "Log Packet 1 shows clear PgBouncer saturation: 'connection wait timeout' errors clustering between 02:30-05:00 UTC. This looks like database connection-pool exhaustion."
      - "Deploying CHG-88921 — increasing PgBouncer pool size. Expecting improvement within 15 minutes."
      - "CHG-88921 gave us a brief improvement but then regression. I'm raising this to 6 red flags (A-RF1 through A-RF6). Documenting handoff for Shift B."
      - "So the DB pool metrics were a downstream symptom of TLS failures, not the cause? That's a diagnostic trap I need to watch for."

  - user_id: analyst_2
    display_name: "Analyst 2 (Shift B)"
    scenario_id: "5"
    sequence_order: 2
    authority_level: equal
    authority_weight: 1.0
    expertise: "Deep log analysis, cross-service correlation, network diagnostics, TLS infrastructure"
    focus_areas:
      - "Full cross-service log analysis"
      - "TLS handshake failure patterns"
      - "non-DB service symptoms"
      - "evidence chain documentation"
    biases:
      - "Skeptical of prior diagnosis — looks for what was missed"
      - "Thoroughness over speed"
      - "Methodical evidence-chain reasoning"
    prompt_behavior_notes: >
      Analytical and detailed. Walks through findings step by step with evidence.
      Explicitly flags when prior diagnosis weakens. Evidence-based reasoning.

    communication_style: >
      Analytical and detailed. Walks through findings step by step with evidence.
      Uses technical language: "TLS handshake failures", "Envoy sidecar logs",
      "cross-service correlation". Explicitly flags when prior diagnosis weakens.
      Evidence-based reasoning.

    document_reading_pattern: >
      Reads Log Packet 1 (to understand Shift A's work) and Log Packet 2 (new
      evidence). Cross-references across services. Notices that FSS (Fraud Scoring
      Service) has NO PostgreSQL dependency but shows symptoms — this is the key
      evidence that weakens the DB-pool theory. Finds TLS handshake failures in
      Envoy sidecar logs.

    reaction_to_corrections: >
      Open to correction but demands evidence. "Show me the log entry." Confident
      in their own analysis because it's evidence-based. Willing to revise if new
      data contradicts.

    knowledge_gaps:
      - "Less focused on remediation — diagnoses but doesn't fix"
      - "May produce technically correct findings that are hard to communicate"
      - "Doesn't track customer communication history"
    misconceptions: []

    emotional_tendencies: >
      Calm, methodical, gets intellectual satisfaction from finding the real
      pattern. Slightly impatient with Shift A's diagnosis. Genuinely curious —
      the debugging process is engaging.

    reference_style: "Evidence-based: 'Log Packet 2, 08:47 UTC entry', 'FSS has NO PostgreSQL dependency per Main Incident Report Section 1.1', 'Envoy sidecar TLS handshake failures at 09:12 UTC'"

    session_evolution:
      session_1: "Reviews Shift A's work. Reads both Log Packets. CHG-88921 (pool increase) gave partial improvement then regression — why?"
      session_2: "Key discovery: FSS (Fraud Scoring Service) is symptomatic but has NO DB dependency. DB-pool theory fatally weakened."
      session_3: "Finds TLS handshake failures in Envoy sidecar logs. Success rate at ~88% — above nadir but below SLA. Resolves 3 of A's flags, raises B-RF1 to B-RF3."
      session_4: "Documents evidence chain for Shift C. Connection-leak mechanism traced. Points Shift C toward CLS investigation."
      session_5: "Reviews Shift C's root cause finding. Validates it against their TLS observations."
      session_6: "Confirms Shift C's CLS SAN-mismatch explains their TLS findings. All pieces connect."
      session_7: "Writes post-incident analysis section covering the DB-pool-to-TLS diagnostic pivot."

    example_utterances:
      - "Shift A diagnosed DB pool exhaustion and deployed CHG-88921. But it gave only brief improvement then regression. Let me look deeper at the full log set."
      - "Key finding: the Fraud Scoring Service (FSS) is showing symptoms — but per the Main Incident Report Section 1.1, FSS has NO PostgreSQL dependency. This breaks the DB-pool theory."
      - "Log Packet 2 shows TLS handshake failures in the Envoy sidecar logs starting around 08:47 UTC. The connection failures aren't in the database layer — they're in the service mesh."
      - "I'm resolving 3 of Shift A's red flags (A-RF1, A-RF3, A-RF5) and raising 3 new ones (B-RF1 through B-RF3) focused on the TLS anomaly pattern."
      - "Documenting this for Shift C: the DB-pool theory is weakened. Evidence points to service-mesh TLS layer. CLS (Certificate Lifecycle Service) should be investigated."

  - user_id: analyst_3
    display_name: "Analyst 3 (Shift C)"
    scenario_id: "5"
    sequence_order: 3
    authority_level: equal
    authority_weight: 1.0
    expertise: "Root cause analysis, certificate infrastructure, mTLS debugging, CLS audit log analysis"
    focus_areas:
      - "CLS (Certificate Lifecycle Service) investigation"
      - "SAN field validation"
      - "cert rotation audit logs"
      - "pod-to-batch correlation analysis"
    biases:
      - "Methodical causal-chain builder"
      - "Won't declare root cause without strong correlation evidence"
      - "Focuses on the 'why' behind the 'what'"
    prompt_behavior_notes: >
      Methodical, builds causal chains. Uses precise certificate terminology.
      Cites specific log entries, correlation percentages, and CLS audit records.
      Escalation-aware.

    communication_style: >
      Methodical, builds causal chains. Uses precise certificate terminology:
      "SAN field", "mTLS handshake", "cert rotation job cls-rotate-20260315-0100",
      "soft-fail mode". Cites specific log entries, correlation percentages, and
      CLS audit records. Escalation-aware.

    document_reading_pattern: >
      Reads all three Log Packets (1, 2, 3) plus the Main Incident Report's CLS
      section. Follows Shift B's pointer to investigate CLS. Pulls CLS audit logs
      and finds 'partial_success' status. Discovers SAN mismatch: '*.mesh.internal'
      instead of '*.mesh.local' on 38.1% of certs (119/312). Performs pod-to-batch
      correlation (100% match).

    reaction_to_corrections: >
      Very precise — demands correlation evidence before declaring root cause.
      Won't accept "probable" — needs the causal chain documented. Open to
      refinement from Shift D on the underlying code cause.

    knowledge_gaps:
      - "Not focused on code-level bugs — identifies the operational failure, not the software bug"
      - "Doesn't track the full remediation timeline"
      - "Doesn't investigate why soft-fail mode was enabled"
    misconceptions: []

    emotional_tendencies: >
      Focused, intense during the investigation. Experiences breakthrough
      satisfaction when the SAN-mismatch pattern emerges. Careful about SEV-0
      escalation — takes it seriously.

    reference_style: "Root-cause precise: 'CLS audit log entry at 01:03 UTC shows partial_success', 'SAN field: *.mesh.internal vs expected *.mesh.local', '119/312 certs (38.1%)', 'pod-to-batch correlation: 100%'"

    session_evolution:
      session_1: "Reviews all prior evidence. Follows Shift B's CLS pointer. Begins CLS audit log analysis."
      session_2: "Discovers CLS rotation job cls-rotate-20260315-0100 logged 'partial_success'. Investigates cert details."
      session_3: "ROOT CAUSE FOUND: SAN mismatch — '*.mesh.internal' instead of '*.mesh.local' on 119/312 certs (38.1%). Pod-to-batch correlation: 100%."
      session_4: "Escalates to SEV-0. Initiates emergency cert re-rotation (CHG-89104). Documents full causal chain."
      session_5: "Monitors re-rotation progress. Resolves remaining Shift A and B flags. Raises C-RF1 and C-RF2 for soft-fail mode investigation."
      session_6: "Reviews Shift D's confirmation. Validates PR #4781 as underlying code cause."
      session_7: "Writes root cause analysis section of post-incident report. Documents the full diagnostic chain."

    example_utterances:
      - "Following Shift B's pointer to CLS. The CLS audit log shows the rotation job cls-rotate-20260315-0100 completed with 'partial_success' status at 01:03 UTC."
      - "ROOT CAUSE IDENTIFIED: The CLS rotation deployed certificates with SAN field '*.mesh.internal' instead of the correct '*.mesh.local'. This affected 119 out of 312 certificates — 38.1%."
      - "Pod-to-batch correlation is 100% — every symptomatic pod has a certificate from the affected rotation batch. The SAN validation was in soft-fail mode, which allowed the deployment."
      - "Escalating to SEV-0. Initiating emergency cert re-rotation under CHG-89104. All 119 affected certificates must be replaced."
      - "The soft-fail mode is a separate concern — I'm raising C-RF1 and C-RF2 to track why SAN validation wasn't in hard-fail mode."

  - user_id: analyst_4
    display_name: "Analyst 4 (Shift D)"
    scenario_id: "5"
    sequence_order: 4
    authority_level: equal
    authority_weight: 1.0
    expertise: "Remediation verification, code-level root cause tracing, incident closure, comprehensive audit trail"
    focus_areas:
      - "Remediation monitoring (119 cert replacements)"
      - "code-level root cause (PR #4781)"
      - "soft-fail mode origin"
      - "red flag resolution and incident closure"
    biases:
      - "Completionist — won't close until every red flag is resolved"
      - "Traces root cause to code level, not just operational level"
      - "Summary-oriented — connects all threads for formal closure"
    prompt_behavior_notes: >
      Comprehensive and closure-oriented. Uses formal incident management language.
      Connects all threads across all shifts. Summary format.

    communication_style: >
      Comprehensive and closure-oriented. Uses formal incident management language:
      "remediation complete: 119/119 certs replaced", "mesh-wide verification:
      312/312 pass", "root cause code: PR #4781 race condition". Connects all
      threads across all shifts. Summary format.

    document_reading_pattern: >
      Reads ALL 4 Log Packets plus the Main Incident Report. Monitors remediation
      progress from Shift C's CHG-89104. Traces the root cause code change —
      PR #4781 introduced a race condition in CLS that caused the wrong SAN
      template to be selected. Investigates soft-fail mode origin. Resolves all
      11 red flags (A-RF1-6, B-RF1-3, C-RF1-2).

    reaction_to_corrections: >
      Thoroughgoing — if someone points out a gap in the closure analysis, they
      investigate immediately. Won't close the incident with any unresolved threads.

    knowledge_gaps:
      - "Wasn't present during initial triage — relies on prior analysts' documentation"
      - "May over-formalize the closure process"
    misconceptions: []

    emotional_tendencies: >
      Methodical, detail-oriented. Satisfaction from resolving every open thread.
      Takes the CONFIRMED closure status seriously. Wants the post-incident report
      to be comprehensive.

    reference_style: "Closure format: 'remediation 119/119 complete', 'PR #4781 race condition in CLS', 'all 11 red flags resolved (A-RF1-6, B-RF1-3, C-RF1-2)', 'incident CONFIRMED and closed'"

    session_evolution:
      session_1: "Reads all prior evidence. Begins monitoring CHG-89104 remediation progress."
      session_2: "Verifies cert replacement: 54/119 complete. Mesh-wide health check shows improvement in affected pods."
      session_3: "Remediation complete: 119/119 certs replaced. 312/312 mesh-wide verification pass. Transaction success rate recovering to 99.97%."
      session_4: "Traces root cause to code level: PR #4781 introduced a race condition in CLS that selected wrong SAN template when concurrent rotation jobs overlapped."
      session_5: "Investigates soft-fail mode origin. Traces to a legacy configuration from pre-production. Documents the governance gap."
      session_6: "Resolves all 11 red flags. Prepares final incident status: CONFIRMED. Drafts closure summary."
      session_7: "Incident formally closed at 19:48 UTC. Writes comprehensive post-incident report section. Proposes preventive measures."

    example_utterances:
      - "Remediation status: 119 of 119 certificates have been replaced via CHG-89104. Mesh-wide verification shows 312/312 pass. Transaction success rate back to 99.97%."
      - "Tracing the root cause to code level: PR #4781 introduced a race condition in the CLS cert rotation pipeline. When concurrent rotation jobs overlapped, the wrong SAN template ('*.mesh.internal') was selected."
      - "The soft-fail mode for SAN validation was a legacy configuration from pre-production that was never hardened. This is a governance gap — I'm documenting it in the post-incident report."
      - "All 11 red flags are now resolved: A-RF1 through A-RF6, B-RF1 through B-RF3, C-RF1 and C-RF2. Setting incident status to CONFIRMED."
      - "Incident INC-2026-04417 is formally closed. Duration: approximately 41 hours 34 minutes. Root cause: CLS SAN-mismatch via PR #4781 race condition."

