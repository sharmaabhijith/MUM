scenario_id: "5"
name: "Support Escalation: Enterprise Incident"
relationship_type: sequential
domain: "Technology / Support"
sessions_per_user: 7
turns_per_session: 18

timeline:
  start_date: "2025-08-11T02:00:00Z"
  end_date: "2025-08-13T23:00:00Z"
  description: "3-day multi-day enterprise incident. Hour-level timestamps. Sequential handoffs between agents."
  session_schedule:
    agent_a:
      - {session: 1, date: "2025-08-11T02:00:00Z"}
      - {session: 2, date: "2025-08-11T06:00:00Z"}
      - {session: 3, date: "2025-08-11T10:00:00Z"}
      - {session: 4, date: "2025-08-12T08:00:00Z"}
