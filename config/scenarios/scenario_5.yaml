injected_conflicts:
  - conflict_id: "C5-1"
    users: ["analyst_1", "analyst_2"]
    topic: "Root cause: DB pool exhaustion vs service-mesh TLS anomaly"
    nature: "Analyst 1: DB pool exhaustion based on PgBouncer saturation and connection-wait timeouts. Analyst 2: DB-pool theory weakened — FSS (no DB dependency) symptomatic; TLS handshake failures found in sidecar logs."
    resolution: "Temporal supersession — Analyst 2's evidence weakens Analyst 1's diagnosis."
    target_sessions: [1, 2, 3]
  - conflict_id: "C5-2"
    users: ["analyst_2", "analyst_3"]
    topic: "TLS anomaly scope: generic network issue vs specific CLS SAN-mismatch"
    nature: "Analyst 2: frames as generic 'network/proxy anomaly' with TLS handshake failures. Analyst 3: refines to specific root cause — CLS SAN-mismatch on 38.1% of certs."
    resolution: "Temporal supersession — Analyst 3 refines Analyst 2's observation to a specific root cause."
    target_sessions: [3, 4, 5]
  - conflict_id: "C5-3"
    users: ["analyst_3", "analyst_4"]
    topic: "Root cause depth: operational CLS failure vs code-level PR #4781 race condition"
    nature: "Analyst 3: identifies CLS SAN-mismatch as root cause (operational level). Analyst 4: deepens to code-level cause — PR #4781 race condition caused wrong SAN template selection."
    resolution: "Temporal refinement — Analyst 4 confirms and deepens Analyst 3's finding."
    target_sessions: [5, 6, 7]

session_arc:
  session_1: "Shift A — Initial triage: Analyst 1 receives first PagerDuty alerts, reviews DB metrics, forms DB-pool hypothesis."
  session_2: "Shift A continued: CHG-88921 deployed. Brief improvement then regression. Red flags documented."
  session_3: "Shift B — Deep analysis: Analyst 2 discovers FSS (no DB) symptomatic. TLS handshake failures found. DB-pool theory weakened."
  session_4: "Shift B/C transition: Evidence chain documented. Analyst 3 begins CLS investigation. Root cause identification."
  session_5: "Shift C — Root cause: CLS SAN-mismatch identified. SEV-0 escalation. Emergency re-rotation initiated."
  session_6: "Shift C/D transition: Remediation monitored. Analyst 4 traces code-level cause. Red flags being resolved."
  session_7: "Shift D — Closure: All certs replaced. PR #4781 confirmed. All 11 red flags resolved. Incident CONFIRMED and closed."

annotation_targets:
