    agent_b:
      - {session: 1, date: "2025-08-11T11:00:00Z"}
      - {session: 2, date: "2025-08-11T15:00:00Z"}
      - {session: 3, date: "2025-08-11T20:00:00Z"}
      - {session: 4, date: "2025-08-12T10:00:00Z"}
