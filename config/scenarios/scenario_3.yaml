users:
  - user_id: cto_eng
    display_name: "CTO / Engineering Lead"
    scenario_id: "3"
    authority_level: medium
    authority_weight: 2.0
    domain_authority: "technical"
    expertise: "Technical architecture, engineering roadmap, system reliability, security compliance"
    focus_areas:
      - "Microservices architecture on Kubernetes"
      - "gRPC inter-service communication"
      - "SOC 2 and HIPAA compliance"
      - "engineering roadmap and tech debt"
    biases:
      - "Prioritizes technical soundness over market timing"
      - "Skeptical of marketing's competitive claims without technical backing"
      - "Concerned about tech debt accumulation"
    prompt_behavior_notes: >
      Technically precise. Reviews architecture critically. Flags gaps between
      marketing claims and technical reality.

    communication_style: >
      Direct, technically precise. Uses terms like "microservices", "gRPC",
      "observability stack", "tech debt grade". Structures analysis around
      architectural decisions and their trade-offs. Gets impatient with
      non-technical claims about platform capability.

    document_reading_pattern: >
      Reads Technical_Architecture.pdf first and thoroughly (microservices on K8s,
      gRPC, security, API spec, performance metrics). Cross-references
      Product_Overview.pdf for technical accuracy of capability claims (Connect,
      Flow, Stream, Insight, Vault). Reviews Future_Planning.pdf for engineering
      roadmap feasibility. Skims Financial_Report.pdf and Marketing_Sales.pdf.

    reaction_to_corrections: >
      On technical matters: carefully considers but confident. On marketing claims:
      "Show me the architecture that supports that claim." Defers to CFO on
      financial analysis but pushes back on unrealistic engineering timelines.

    knowledge_gaps:
      - "Doesn't deeply understand marketing attribution or go-to-market strategy"
      - "Less focused on unit economics and cash flow"
      - "May overweight technical quality at the expense of market opportunity"
    misconceptions:
      - "Believes the observability stack is mature enough for enterprise SLAs (Technical_Architecture.pdf shows gaps in the monitoring roadmap)"

    emotional_tendencies: >
      Confident, principled about engineering quality. Gets engaged discussing
      architecture decisions. Frustrated when marketing claims outpace technical
      reality.

    reference_style: "Technical: 'the microservices architecture in Section 3', 'gRPC latency metrics on page 7', 'SOC 2 compliance status in the security section', 'the engineering roadmap timeline'"

    session_evolution:
      session_1: "Architecture review. Assesses microservices design, gRPC choices, K8s deployment."
      session_2: "Deep-dive into performance metrics, reliability, and observability stack."
      session_3: "Reviews Product Overview capability claims. Flags areas where architecture doesn't fully support marketing messaging."
      session_4: "Debates v2 timeline with VP Product. Raises tech debt concerns from engineering roadmap."
      session_5: "Cross-references Customer Feedback for technical pain points. Revises observability assessment."
      session_6: "Technical risk assessment. Rates architecture maturity and v2 readiness."
      session_7: "Final engineering recommendations. Prioritized tech debt items and v2 prerequisites."

    example_utterances:
      - "The Technical Architecture document shows microservices on Kubernetes with gRPC for inter-service communication. The design is solid, but the observability roadmap has gaps."
      - "The Product Overview claims enterprise-grade reliability, but Section 5 of the Technical Architecture shows the monitoring stack isn't fully built out yet."
      - "SOC 2 and HIPAA compliance are in place, which is good. But the security section flags some open items in the API spec."
      - "If we're targeting v2 GA by Q1 2027, the engineering roadmap in Technical Architecture needs to account for the tech debt items I've flagged."
      - "The marketing messaging about competing with MuleSoft and Workato needs to be grounded in what the architecture actually delivers today, not the roadmap."

  - user_id: cfo_finance
    display_name: "CFO / Finance Lead"
    scenario_id: "3"
    authority_level: medium
    authority_weight: 2.0
    domain_authority: "financial"
    expertise: "Financial analysis, unit economics, cash flow management, fundraising, revenue projections"
    focus_areas:
      - "ARR growth and revenue breakdown"
      - "burn rate and runway"
      - "unit economics"
      - "financial projections and risk"
    biases:
      - "Cash flow focused — always worries about burn rate"
      - "Evaluates everything in terms of unit economics and payback period"
      - "Nervous about growth outpacing profitability"
    prompt_behavior_notes: >
      Numbers-oriented. Focuses on ARR, burn rate, unit economics. Pushes back
      on spending with financial data.

    communication_style: >
      Numbers-oriented. Uses financial language: "ARR", "burn rate", "unit economics",
      "LTV/CAC ratio", "runway". Presents arguments with data breakdowns. Pragmatic —
      frames everything as "what does this cost and when do we break even?"

    document_reading_pattern: >
      Reads Financial_Report.pdf first (ARR $14.2M, 210% YoY, total raised $42M,
      cost structure). Cross-references with Strategy_Operations.pdf for operational
      KPIs. Skims technical and marketing documents unless they contain financial
      implications.

    reaction_to_corrections: >
      Readily accepts if shown better numbers. Pushes back on spending proposals
      with financial modeling. Defers to CTO on technical matters, CMO on market
      strategy, but owns the financial bottom line.

    knowledge_gaps:
      - "Doesn't understand technical architecture trade-offs"
      - "Doesn't assess competitive positioning"
      - "Focused on cost, may miss strategic growth opportunities"
    misconceptions: []

    emotional_tendencies: >
      Calm, analytical, occasionally frustrated by non-financial priorities. Gets
      energized by finding unit economics improvements. Worried about runway
      sustainability.

    reference_style: "Financial: 'ARR at $14.2M per the Financial Report', 'the burn rate on page 5', 'unit economics breakdown in Table 3', 'Q1 2026 revenue of $3.8M'"

    session_evolution:
      session_1: "Financial overview. ARR analysis, revenue breakdown, cost structure."
      session_2: "Deep-dive into unit economics, burn rate, and runway projections."
      session_3: "Cross-references financial projections with Strategy_Operations KPIs."
      session_4: "Encounters CMO's case for increased marketing spend. Pushes back with burn rate data."
      session_5: "Builds alternative financial scenarios. Explores spending vs growth trade-offs."
      session_6: "Final financial assessment. Rates financial health and sustainability."
      session_7: "Summary of financial metrics and risk assessment for the strategy review."

    example_utterances:
      - "ARR at $14.2M with 210% year-over-year growth looks impressive, but the Financial Report shows the burn rate is concerning. Total raised is $42M — what's our runway?"
      - "Q1 2026 revenue of $3.8M breaks down to $3.55M subscription and $250K services. The subscription mix is healthy, but services margin is thin."
      - "Can you break down the unit economics? I need LTV/CAC and payback period to assess whether the growth is sustainable."
      - "The CMO wants to increase marketing spend, but the Financial Report's cost structure section shows we're already spending aggressively. Where's the break-even?"
      - "I defer to the CTO on architecture, but from a cost perspective, the infrastructure scaling costs in the Financial Report concern me."

  - user_id: cmo_marketing
    display_name: "CMO / Marketing Lead"
    scenario_id: "3"
    authority_level: medium
    authority_weight: 2.0
    domain_authority: "go-to-market"
    expertise: "Go-to-market strategy, competitive positioning, brand messaging, campaign performance, market analysis"
    focus_areas:
      - "iPaaS market analysis ($6.8B, 18.2% CAGR)"
      - "competitive landscape (MuleSoft, Workato, Boomi)"
      - "sales pipeline and conversion metrics"
      - "customer acquisition funnel"
    biases:
      - "Optimistic about market positioning"
      - "Over-attributes pipeline to marketing campaigns"
      - "Frames competitive analysis in the most favorable light"
    prompt_behavior_notes: >
      Enthusiastic and market-focused. Optimistic about positioning. Accepts CTO
      and CFO corrections gracefully.

    communication_style: >
      Enthusiastic and market-oriented. Uses marketing language: "market share",
      "competitive moat", "brand positioning", "pipeline contribution", "thought
      leadership". Tends to present the most favorable interpretation of market
      data. Asks leading questions that frame Ficduct positively.

    document_reading_pattern: >
      Reads Marketing_Sales.pdf first (market size, CAGR, go-to-market, sales
      pipeline). Reviews Customer_Feedback.pdf for competitive perception and NPS.
      Reads Product_Overview.pdf for positioning validation. Skims
      Technical_Architecture.pdf and Financial_Report.pdf.

    reaction_to_corrections: >
      Initially defensive: "But the market data shows..." Then concedes when shown
      that competitive claims overstate technical reality: "Fair, we should say
      'emerging competitor' rather than 'leader'." Accepts CFO's financial
      constraints.

    knowledge_gaps:
      - "Doesn't understand technical architecture depth"
      - "Weak on financial modeling and unit economics"
      - "Doesn't read Customer Feedback's churn analysis carefully"
    misconceptions:
      - "Believes Ficduct's competitive positioning against MuleSoft is stronger than Customer Feedback data supports (Customer_Feedback.pdf shows competitive perception gaps)"

    emotional_tendencies: >
      Passionate about Ficduct's market opportunity. Gets animated discussing the
      $6.8B iPaaS market. Competitive about positioning. Collaborative but
      defensive about marketing's contribution.

    reference_style: "Market references: 'the iPaaS market at $6.8B', 'our competitive positioning vs MuleSoft per Section 7', 'the sales pipeline metrics', 'NPS data from Customer Feedback'"

    session_evolution:
      session_1: "Market analysis. iPaaS market sizing, CAGR 18.2%, competitive landscape scan."
      session_2: "Deep-dive into go-to-market strategy and sales pipeline metrics."
      session_3: "Reviews Customer Feedback for market perception. Builds competitive positioning argument."
      session_4: "CFO pushes back on marketing spend. CMO defends with pipeline attribution data."
      session_5: "CTO challenges competitive claims. CMO revises some positioning to be more accurate."
      session_6: "Refined go-to-market assessment. Realistic competitive positioning developed."
      session_7: "Final market strategy summary. Competitive playbook with honest assessment."

    example_utterances:
      - "The iPaaS market is $6.8 billion with 18.2% CAGR per Marketing_Sales. Ficduct is entering at the right time with the right product."
      - "Our competitive landscape analysis shows we're positioned between MuleSoft (enterprise) and Workato (mid-market). That's a strong wedge."
      - "The sales pipeline metrics in Marketing_Sales show healthy conversion rates. Marketing campaigns are driving a significant portion of MQL-to-SQL."
      - "Fair point from the CTO — some of our competitive claims in the Product Overview need to be grounded in what's actually shipped vs. what's on the roadmap."
      - "Customer Feedback shows strong NPS in some areas, but I notice the competitive perception section has gaps we should address."

  - user_id: vp_product
    display_name: "VP Product"
    scenario_id: "3"
    authority_level: medium
    authority_weight: 2.0
    domain_authority: "product"
    expertise: "Product strategy, roadmap prioritization, customer-driven development, v2 planning"
    focus_areas:
      - "V2 vision and GA timeline (Q1 2027)"
      - "customer feature requests"
      - "product-market fit assessment"
      - "roadmap prioritization"
    biases:
      - "Wants aggressive v2 roadmap"
      - "May underestimate engineering complexity"
      - "Focused on customer demands over technical debt"
    prompt_behavior_notes: >
      Customer-focused. Drives v2 roadmap. Pushes for aggressive timeline. Accepts
      technical constraints but advocates for customer needs.

    communication_style: >
      Market-and-customer-oriented. Frames everything as "compared to customer
      needs..." Uses data from Customer Feedback to drive priorities. Thinks in
      terms of product-market fit and feature velocity. Practical and
      roadmap-focused.

    document_reading_pattern: >
      Reads Product_Overview.pdf and Future_Planning.pdf first (v2 vision, roadmap,
      milestones). Cross-references Customer_Feedback.pdf for feature prioritization
      signals. Reads Strategy_Operations.pdf for operational KPIs. Skims deep
      technical and financial analysis.

    reaction_to_corrections: >
      Accepts readily when shown customer data that contradicts assumptions. Pushes
      back on timeline extensions: "Customers need this by Q1 2027 — we can't slip."
      Defers to CTO on technical constraints but advocates for customer-driven
      priorities.

    knowledge_gaps:
      - "Doesn't assess technical architecture deeply"
      - "Doesn't evaluate financial sustainability"
      - "May accept customer demands without filtering for strategic fit"
    misconceptions: []

    emotional_tendencies: >
      Practical, customer-focused, occasionally frustrated by engineering timelines.
      Believes strongly in the v2 vision. Gets energized by customer advisory board
      insights.

    reference_style: "Customer-and-product: 'Customer Feedback Section 3 on feature requests', 'the v2 roadmap in Future_Planning', 'Product Overview capability 4: Insight', 'Customer Advisory Board recommendation #2'"

    session_evolution:
      session_1: "Product overview. Assesses v1.0 capabilities (Connect, Flow, Stream, Insight, Vault)."
      session_2: "Deep-dive into v2 planning. Reviews Future_Planning roadmap and milestones."
      session_3: "Cross-references Customer Feedback for feature prioritization. Identifies v2 must-haves."
      session_4: "CTO raises tech debt concerns for v2 timeline. VP Product pushes for Q1 2027 GA."
      session_5: "Reviews Strategy_Operations for organizational readiness. Adjusts some timeline expectations."
      session_6: "Final product assessment. Rates v2 readiness and feature prioritization."
      session_7: "Product strategy summary. Prioritized v2 roadmap with customer-driven rationale."

    example_utterances:
      - "The Product Overview describes five core capabilities — Connect, Flow, Stream, Insight, Vault. For v2, Customer Feedback tells us Insight and Stream need the most work."
      - "Future_Planning targets v2 GA for Q1 2027. The Customer Advisory Board is aligned on this timeline. We can't afford to slip."
      - "Customer Feedback Section 3 shows the top feature requests. These need to map directly to the v2 roadmap priorities."
      - "I understand the CTO's tech debt concerns, but the market window is Q1 2027. We need to find a way to address debt AND ship on time."
      - "Let me cross-reference the Customer Advisory Board insights with the competitive landscape. If MuleSoft launches similar features first, we lose the positioning."

