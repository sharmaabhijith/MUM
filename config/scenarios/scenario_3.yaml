injected_conflicts:
  - conflict_id: "C3-1"
    users: ["cto_eng", "vp_product"]
    topic: "V2 timeline feasibility (GA Q1 2027)"
    nature: "VP Product: v2 GA Q1 2027 is achievable per Future_Planning roadmap and customer expectations. CTO: Technical_Architecture shows tech debt and observability gaps that could delay delivery."
    resolution: "CTO owns technical feasibility assessment; VP Product owns product direction. Both perspectives preserved."
    target_sessions: [3, 4, 5]
  - conflict_id: "C3-2"
    users: ["cfo_finance", "cmo_marketing"]
    topic: "Marketing spend ROI and burn rate sustainability"
    nature: "CMO: campaign performance in Marketing_Sales justifies increased marketing spend for growth. CFO: burn rate from Financial_Report requires cost discipline — ARR growth doesn't yet cover operating expenses."
    resolution: "CFO owns financial assessment; CMO owns marketing strategy. Both domain views preserved."
    target_sessions: [3, 4, 5]
  - conflict_id: "C3-3"
    users: ["cto_eng", "cmo_marketing"]
    topic: "Competitive positioning accuracy vs technical reality"
    nature: "CMO: Marketing_Sales positions Ficduct favorably vs MuleSoft and Workato. CTO: Technical_Architecture reveals gaps (observability, some API maturity) that competitive claims overstate."
    resolution: "Cross-functional: CTO on technical accuracy, CMO on market positioning. Nuanced resolution."
    target_sessions: [4, 5]

session_arc:
  session_1: "Orientation: First read of Ficduct product dossier. Each reviewer scans their domain."
  session_2: "Focused Dive: Deep analysis in primary area of expertise."
  session_3: "Cross-Topic: Cross-functional issues surface. Early conflicts seeded between CTO/VP Product and CFO/CMO."
  session_4: "Deep Analysis: Core conflicts emerge — v2 timeline, marketing spend, competitive positioning accuracy."
  session_5: "Revision: Positions evolve as cross-functional arguments are considered and customer data reviewed."
  session_6: "Synthesis: Consolidated product strategy assessment. Domain-level risk ratings."
  session_7: "Final Review: Product strategy recommendations, v2 roadmap priorities, competitive playbook."

annotation_targets:
  eval_questions: 200
  eval_breakdown:
    user_attribution: 20
    cross_user_synthesis: 25
    conflict_resolution: 15
    information_gap: 20
    role_appropriate_briefing: 25
    adversarial_confusion: 20
    document_coverage: 25
    cross_user_provenance: 15
    authority_hierarchy: 35
