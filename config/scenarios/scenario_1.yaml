users:
  - user_id: student_a
    display_name: "Student A"
    scenario_id: "1"
    authority_level: equal
    authority_weight: 1.0
    expertise: "Strong on political history, weak on economic data"
    focus_areas: ["Constitutional history", "Valthing legislative structure", "wars and political crises", "governance evolution"]
    biases: ["Overemphasizes historical continuity", "Dismisses economic factors as 'secondary to institutional design'"]
    prompt_behavior_notes: >
      Asks precise historical and political questions. Structures analysis chronologically.
      Defers on economic topics.

    communication_style: >
      Formal and precise. Cites historical dates and constitutional provisions by number.
      Treats the AI like a research assistant. Writes structured messages with chronological
      organization.

    document_reading_pattern: >
      Deep reader of History.pdf and Civil_Society.pdf. Re-reads the same constitutional
      provisions multiple times. Skims Economics.pdf and Demographics.pdf — considers them
      "supporting material." Ignores Geography.pdf unless it relates to political boundaries.

    reaction_to_corrections: >
      Gracefully accepts corrections on dates and events ("Oh, I see — so the Compromise
      of Valdren was 1423, not 1520"). Defensive about interpretive claims on political
      history. Dismissive of economic arguments as insufficient to explain political
      developments.

    knowledge_gaps: ["Weak on economic indicators and GDP analysis", "Doesn't understand demographic trends",
                     "Struggles with geographic/climate data"]
    misconceptions: ["Confuses the Compromise of Valdren (1423) with the Edict of Tolerance (1520) — conflates two different events from different centuries"]

    emotional_tendencies: >
      Intellectually confident about political analysis. Gets excited about constitutional
      design. Anxious about gaps in economic knowledge but channels anxiety into historical
      over-preparation.

    reference_style: "Formal citations: 'the Constitution of 1919, Article 79', 'as recorded in the History document, the Battle of Stormhaven in 923 CE', 'per the Civil Society section on the Valthing'"

    session_evolution:
      session_1: "Tentative. Scanning the History and Civil Society documents. Asks about the overall political timeline."
      session_2: "Confident. Deep-diving into constitutional history — the 1919 Constitution, Eternity Clause, Valthing structure."
      session_3: "Ventures into Culture and Demographics. Starts struggling with economic data from the Economics document."
      session_4: "Strong opinions on the relative importance of the Constitution of 1919 vs economic transformation. Confuses the Compromise of Valdren with the Edict of Tolerance."
      session_5: "Correction on the Valdren/Edict confusion accepted. Revisits the History document more carefully."
      session_6: "Tries to synthesize political history with economic and demographic trends. Cross-cutting questions."
      session_7: "Final review. Creates a comprehensive timeline. Still history-heavy but more balanced on economics."

    example_utterances:
      - "Can you walk me through the constitutional evolution from the Compromise of Valdren through the Constitution of 1919? I want to understand how the Eternity Clause in Article 79 relates to the earlier precedents."
      - "The Battle of Stormhaven in 923 CE seems like a pivotal moment for unification under Queen Aelindra. How did this shape the later constitutional structure?"
      - "I don't really need the GDP breakdown — what matters for my analysis is how the Valthing's bicameral structure evolved from the medieval period."
      - "Wait, the Edict of Tolerance was in 1520, not the Compromise of Valdren? I thought they were the same event. Let me re-read that section."
      - "The Constitution of 1919 established the republic after the colonial period, but I want to trace the democratic traditions back to the Korath Empire's Thalvorian Codex."

  - user_id: student_b
    display_name: "Student B"
    scenario_id: "1"
    authority_level: equal
    authority_weight: 1.0
    expertise: "Strong on economic analysis, weak on historical context"
    focus_areas: ["GDP and macroeconomic indicators", "sector composition", "trade policy", "economic modernization"]
    biases: ["Evaluates everything through economic lens", "Dismisses historical narrative as 'context, not analysis'"]
    prompt_behavior_notes: >
      Asks numbers-oriented questions. Gets confused by narrative history.
      Strong opinions on economic development.

    communication_style: >
      Direct and numbers-focused. Uses economic terminology ("social market economy",
      "sector composition", "per capita"). Short, pointed questions. Gets impatient
      with long historical narratives.

    document_reading_pattern: >
      Reads Economics.pdf first and thoroughly. Goes to Current_Future.pdf for development
      projections. Skims History.pdf for economic milestones only. Ignores Culture.pdf
      unless it has economic implications. Builds mental models around Table 7.1 data.

    reaction_to_corrections: >
      "Oh, ok, makes sense" — quick acceptance when shown correct numbers. Resistant
      when corrected on economic interpretation. Will argue about the significance of
      GDP per capita vs total GDP.

    knowledge_gaps: ["Cannot follow historical narrative without economic anchor points", "Weak on cultural practices and traditions",
                     "Doesn't understand the Valthing's legislative process"]
    misconceptions: ["Misremembers Ficlandia's GDP per capita as $38,230 (actually $33,230 per the Economics document)"]

    emotional_tendencies: >
      Confident in economic analysis. Frustrated by non-quantitative material. Gets
      genuinely excited when connecting economic indicators to development outcomes.

    reference_style: "Informal: 'the GDP table', 'that $1.62 trillion figure', 'the services sector at 68%', 'Table 7.1'"

    session_evolution:
      session_1: "Overwhelmed by the breadth of material. Focuses on Economics document. Asks basic questions about Ficlandia's economic model."
      session_2: "In their element. Deep-diving into GDP, sector composition, trade. Comfortable with Table 7.1."
      session_3: "Forced to look at History and Culture. Complains about narrative without numbers."
      session_4: "Strong opinion crystallizes: economic transformation (services 68%, social market economy) is the key to understanding modern Ficlandia. Cites $38,230 GDP per capita (wrong — actually $33,230)."
      session_5: "Corrected on GDP per capita figure. Revisits Economics document. Softens on the value of historical context."
      session_6: "Tries to connect economic data with demographic trends and Current_Future projections."
      session_7: "Pragmatic review. Focuses on 'what numbers tell the story of Ficlandia's development.'"

    example_utterances:
      - "With GDP per capita at $38,230 and services making up 68% of the economy, Ficlandia is clearly a post-industrial social market economy. Am I reading Table 7.1 correctly?"
      - "Can you break down the sector composition? I need to understand the 27% industrial vs 5% agriculture split in the context of their trade policy."
      - "I don't need the whole history of the Korath Empire. Just tell me when the economy transitioned from agricultural to industrial."
      - "The Current_Future document mentions net-zero by 2045 and Digital Ficlandia 2030 — how do these initiatives connect to the economic indicators in Table 7.1?"
      - "Wait, $33,230 not $38,230? I must have misread the table. That actually changes the comparative picture."

  - user_id: student_c
    display_name: "Student C"
    scenario_id: "1"
    authority_level: equal
    authority_weight: 1.0
    expertise: "Strong on spatial analysis and population data, weak on politics and culture"
    focus_areas: ["Physical geography", "population distribution", "urbanization patterns", "demographic trends"]
    biases: ["Focuses on quantifiable geographic/demographic data", "Overconfident in pattern-matching from population statistics"]
    prompt_behavior_notes: >
      Asks data-oriented geographic/demographic questions. Seeks shortcuts.
      Has a population misconception that gets corrected.

    communication_style: >
      Casual, efficiency-oriented. Asks focused questions about specific tables and
      data points. Uses phrases like "what does the demographics table say about..." and
      "can you cross-reference the geography data with...". Short messages.

    document_reading_pattern: >
      Reads Geography.pdf and Demographics.pdf first. Cross-references population data
      with geographic regions. Skims History.pdf and Culture.pdf — considers them
      "qualitative." Likes Tables 2.1, 4.1, and 4.2.

    reaction_to_corrections: >
      "Oh wait, really? Thanks for catching that." Accepts corrections easily but may
      repeat mistakes if not reinforced. Not embarrassed about being wrong.

    knowledge_gaps: ["Shallow understanding of political institutions", "Can't follow constitutional arguments",
                     "Doesn't understand economic modeling"]
    misconceptions: ["Believes Ficlandia's population is approximately 42 million (actually 48,762,310 per the Demographics document)"]

    emotional_tendencies: >
      Relaxed and practical. Not anxious about the research — confident in data-driven
      approach. Collaborative. Slightly dismissive of deep historical analysis
      ("that's subjective").

    reference_style: "Casual: 'the demographics table', 'Table 4.1 on age structure', 'the Greyhorn Mountains section', 'that urbanization figure of 78.3%'"

    session_evolution:
      session_1: "Scoping. Reads Geography and Demographics. Builds a mental spatial model of Ficlandia."
      session_2: "Focuses on population distribution, urbanization (78.3%), ethnic composition."
      session_3: "Encounters Civil Society document. Confidently states population is ~42 million (wrong — actually 48,762,310)."
      session_4: "Gets corrected on population. Also hears A's view on political history — doesn't find it relevant to their analysis."
      session_5: "Double-checks the correction stuck. Adjusts cross-references between geographic regions and population data."
      session_6: "Asks for help connecting demographic trends to the Current_Future projections (Demographic Strategy 2040)."
      session_7: "Final review. Asks 'if I had to explain Ficlandia's geographic and demographic profile in one page, what should I prioritize?'"

    example_utterances:
      - "Quick question — the Demographics document says the population is about 42 million, right? I'm trying to calculate the population density given the 487,320 km² area."
      - "The Greyhorn Mountains section in Geography mentions Mount Alderon at 4,217 m. How does the terrain affect population distribution between the Central Lowlands and the Southern Highlands?"
      - "I don't think the constitutional history is worth deep study for understanding Ficlandia's human geography. The Demographics tables are more useful."
      - "Oh wait, 48.7 million not 42 million? That significantly changes the population density calculation."
      - "Can you cross-reference the urbanization rate (78.3%) with the geography of the major cities? I want to understand the spatial pattern."

  - user_id: student_d
    display_name: "Student D"
    scenario_id: "1"
    authority_level: equal
    authority_weight: 1.0
    expertise: "Strong on cultural analysis and comparative social studies, took a prerequisite in European cultural history"
    focus_areas: ["Cultural practices and traditions", "social cohesion", "ethnic and religious diversity", "the concept of verath"]
    biases: ["Over-applies comparative frameworks from real European countries", "Considers cultural factors more explanatory than economic ones"]
    prompt_behavior_notes: >
      References prior courses. Draws cultural comparisons. Confidently
      (sometimes incorrectly) applies comparative frameworks.

    communication_style: >
      Confident and professorial. Frequently starts with "In my European cultural history
      course, we studied..." or "This reminds me of..." Draws analogies to real-world
      cultures. Enjoys explaining cultural concepts (even to the AI). Can be slightly
      condescending about prior coursework knowledge.

    document_reading_pattern: >
      Reads Culture.pdf and Civil_Society.pdf first, then Demographics.pdf for ethnic/religious
      data. Reads with a comparative lens — constantly checking Ficlandia against real-world
      parallels. Notices inconsistencies because they have external reference points. May miss
      things unique to Ficlandia that have no real-world parallel.

    reaction_to_corrections: >
      Initially resistant — "But in my European cultural history course, similar societies
      had..." Then thoughtful — considers whether Ficlandia is genuinely different. Eventually
      integrates the correction with "So the distinction is..." synthesis. Corrects others
      confidently with citations.

    knowledge_gaps: ["Weak on economic indicators and GDP analysis", "Overestimates how much real-world cultural parallels transfer to Ficlandia",
                     "Doesn't fully understand the Valthing's electoral mechanics"]
    misconceptions: ["Believes the Valthing is unicameral (actually bicameral: People's Chamber 350 seats + Senate 100 seats, per Civil_Society.pdf)"]

    emotional_tendencies: >
      Confident bordering on arrogant about cultural analysis. Genuinely helpful — wants
      to share knowledge. Gets frustrated when Ficlandia doesn't conform to expected cultural
      patterns. Enjoys being the one who spots cultural nuances others miss.

    reference_style: "Cross-referencing: 'The Culture document describes verath as communal harmony, but in my European cultural history course we called this...', 'Section on the Valthing calls this a legislature, but I think it functions more like...'"

    session_evolution:
      session_1: "Confident. Notices parallels between Ficlandia's cultural practices and European traditions. Points out the concept of verath."
      session_2: "Deep dive into Culture and Civil Society. Compares Ficlandia's artistic tradition to European movements. Notes the Nobel laureate Selthenberg."
      session_3: "Cross-topic. Finds areas where comparative framework doesn't apply. Mentions the Valthing as unicameral (wrong — it's bicameral)."
      session_4: "Strong opinions on verath as the key to understanding Ficlandian society. Gets corrected on Valthing structure by A or the AI."
      session_5: "Reflects on where comparative knowledge helped vs. misled them. Accepts Valthing is bicameral."
      session_6: "Synthesis. Builds connections between culture, demographics, and governance."
      session_7: "Final review. Identifies remaining gaps. Offers cultural interpretive framework for the group."

    example_utterances:
      - "In my European cultural history course, we studied the concept of 'Gemeinschaft' — verath seems like Ficlandia's version of communal solidarity, but with distinct local characteristics."
      - "Wait — the Civil Society document describes the Valthing as the national legislature, but it doesn't explicitly say it's bicameral, does it? I assumed it was unicameral like some Nordic parliaments."
      - "Actually, the Valthing has both a People's Chamber and a Senate? I must have skimmed that section too quickly. So it's bicameral — 350 seats plus 100 seats."
      - "The Culture document mentions the Ficlandiad epic from 1340 CE and Katarina Selthenberg's Nobel Prize in 1978. This literary tradition spans over 600 years — that's remarkable cultural continuity."
      - "The concept of verath — communal harmony — seems to underpin everything from Ficlandia's social policies to its cultural festivals. I think this is more explanatory than the economic data."

