injected_conflicts:
  - conflict_id: "C1-1"
    users: ["student_a", "student_d"]
    topic: "Structure of the Valthing legislature"
    nature: "D: believes the Valthing is unicameral. A/Documents: bicameral (People's Chamber 350 seats + Senate 100 seats)."
    resolution: "Supersede D's claim with document evidence from Civil_Society.pdf."
    target_sessions: [3, 4, 5]
  - conflict_id: "C1-2"
    users: ["student_b", "student_c"]
    topic: "Ficlandia's population and economic statistics"
    nature: "C: believes population is ~42 million (actually 48,762,310). B: misremembers GDP per capita as $38,230 (actually $33,230). Both correctable from documents."
    resolution: "Correct both misconceptions via document evidence."
    target_sessions: [3, 4]
  - conflict_id: "C1-3"
    users: ["student_a", "student_b"]
    topic: "Relative importance of historical vs economic factors"
    nature: "A: emphasizes historical continuity (Constitution of 1919, Eternity Clause). B: emphasizes economic transformation (social market economy, services 68%)."
    resolution: "Preserve both perspectives — interpretive disagreement between equals."
    target_sessions: [4, 5, 6]

session_arc:
  session_1: "Orientation: First read of Ficlandia documents. Students ask surface-level questions about their primary area."
  session_2: "Focused Dive: Deep analysis in primary expertise area. Students start noticing specific details, tables, and statistics."
  session_3: "Cross-Topic: Students venture into secondary documents. Misconceptions surface. Early conflicts seeded."
  session_4: "Deep Analysis: Core conflicts emerge. Students form strong opinions. Misconceptions get challenged."
  session_5: "Revision: Students revisit earlier conclusions with new document evidence. Corrections happen."
  session_6: "Synthesis: Cross-cutting questions connecting history, economics, culture, and governance."
  session_7: "Final Review: Comprehensive understanding. Remaining gaps identified. Summary preparation."

annotation_targets:
  eval_questions: 175
  eval_breakdown:
    user_attribution: 20
    cross_user_synthesis: 20
    conflict_resolution: 15
    information_gap: 20
    role_appropriate_briefing: 15
    adversarial_confusion: 20
    document_coverage: 20
    cross_user_provenance: 15
    temporal_correction: 30
